name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            suffix=""
            if [ "$goos" = "windows" ]; then suffix=".exe"; fi
            GOOS="$goos" GOARCH="$goarch" go build -o "dist/miseledger-${goos}-${goarch}${suffix}" ./cmd/miseledger
            GOOS="$goos" GOARCH="$goarch" go build -o "dist/sessionfind-${goos}-${goarch}${suffix}" ./cmd/sessionfind
          done
          (cd dist && sha256sum * > checksums.txt)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
          fi
      - name: Verify published install assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p verify
          gh release download "$GITHUB_REF_NAME" --pattern miseledger-linux-amd64 --pattern sessionfind-linux-amd64 --pattern checksums.txt --dir verify
          (cd verify && sha256sum -c checksums.txt --ignore-missing)
          chmod +x verify/miseledger-linux-amd64
          chmod +x verify/sessionfind-linux-amd64
          ./verify/miseledger-linux-amd64 version
          ./verify/sessionfind-linux-amd64 version
          MISELEDGER="$PWD/verify/miseledger-linux-amd64" scripts/smoke_archive.sh
