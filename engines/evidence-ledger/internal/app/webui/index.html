<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiseLedger</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel2: #1c2230; --line: #2a3140;
    --txt: #e6edf3; --dim: #8b97a7; --accent: #6ea8fe; --hit: #f5d96b;
    --good: #56d364;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header {
    position: sticky; top: 0; z-index: 5; background: var(--bg);
    border-bottom: 1px solid var(--line); padding: 14px 20px 12px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .brand h1 { font-size: 16px; margin: 0; letter-spacing: .2px; }
  .brand .sub { color: var(--dim); font-size: 12px; }
  .searchrow { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  #q {
    flex: 1 1 360px; min-width: 220px; padding: 11px 14px; font-size: 15px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 9px;
    color: var(--txt); outline: none;
  }
  #q:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,168,254,.18); }
  select {
    padding: 10px 12px; background: var(--panel); color: var(--txt);
    border: 1px solid var(--line); border-radius: 9px; outline: none;
  }
  .toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
  .toggle button {
    background: var(--panel); color: var(--dim); border: 0; padding: 10px 16px;
    cursor: pointer; font-size: 13px;
  }
  .toggle button.on { background: var(--accent); color: #08111f; font-weight: 600; }
  main { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 0; height: calc(100vh - 116px); }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } #detail { display: none; } }
  #results { overflow-y: auto; border-right: 1px solid var(--line); }
  #detail { overflow-y: auto; padding: 18px 22px; }
  .meta { color: var(--dim); padding: 8px 20px; font-size: 12px; border-bottom: 1px solid var(--line); }
  .row {
    padding: 12px 20px; border-bottom: 1px solid var(--line); cursor: pointer;
  }
  .row:hover { background: var(--panel); }
  .row.sel { background: var(--panel2); }
  .row .top { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
  .tag { font-size: 11px; padding: 1px 7px; border-radius: 999px; background: var(--panel2); color: var(--dim); border: 1px solid var(--line); }
  .tag.src { color: var(--accent); }
  .name { font-weight: 600; }
  .count { color: var(--dim); font-size: 12px; margin-left: auto; }
  .snippet { color: var(--dim); font-size: 13px; white-space: pre-wrap; word-break: break-word; }
  .snippet mark, .hit { background: transparent; color: var(--hit); font-weight: 600; }
  .path { color: var(--good); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
  #detail h2 { font-size: 15px; margin: 0 0 4px; }
  #detail .body { white-space: pre-wrap; word-break: break-word; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 14px; margin-top: 12px; }
  #detail .kv { color: var(--dim); font-size: 12px; margin: 2px 0; }
  #detail code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--good); }
  .empty { color: var(--dim); padding: 40px 20px; text-align: center; }
  kbd { background: var(--panel2); border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 5px; padding: 0 5px; font-size: 11px; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>MiseLedger</h1>
    <span class="sub">local session &amp; conversation finder &middot; <span id="stat"></span></span>
  </div>
  <div class="searchrow">
    <input id="q" placeholder="Search your sessions  (press / or Ctrl+F to focus)" autocomplete="off" autofocus>
    <div class="toggle" id="mode">
      <button data-mode="sessions" class="on">Sessions</button>
      <button data-mode="items">Everything</button>
    </div>
    <select id="source"><option value="">all sources</option></select>
  </div>
</header>
<main>
  <div>
    <div class="meta" id="meta">Loading&hellip;</div>
    <div id="results"></div>
  </div>
  <div id="detail"><div class="empty">Select a result to see details.</div></div>
</main>
<script>
const $ = s => document.querySelector(s);
const qEl = $("#q"), srcEl = $("#source"), resEl = $("#results"), detEl = $("#detail"), metaEl = $("#meta");
let mode = "sessions", timer = null, lastSel = null;

function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
// FTS snippets arrive with [term] markers; turn them into highlights.
function hl(s){ return esc(s).replace(/\[([^\]]*)\]/g, '<span class="hit">$1</span>'); }

async function loadSources(){
  try {
    const st = await (await fetch("/status")).json();
    metaEl.textContent = "";
    $("#stat").textContent = (st.items||0) + " items · " + (st.sources||0) + " sources";
    const counts = st.source_counts || {};
    Object.keys(counts).sort().forEach(k => {
      const o = document.createElement("option");
      o.value = k; o.textContent = k + " (" + counts[k] + ")";
      srcEl.appendChild(o);
    });
  } catch(e){ metaEl.textContent = "Cannot reach miseledger server."; }
}

function setMode(m){
  mode = m;
  document.querySelectorAll("#mode button").forEach(b => b.classList.toggle("on", b.dataset.mode===m));
  run();
}

function debounce(){ clearTimeout(timer); timer = setTimeout(run, 180); }

async function run(){
  const q = qEl.value.trim(), src = srcEl.value;
  const ep = mode === "sessions" ? "/sessions" : "/search";
  const params = new URLSearchParams();
  if (q) params.set("q", q);
  if (src) params.set("source", src);
  params.set("limit", "100");
  // /search requires a query; show a hint instead of erroring.
  if (mode === "items" && !q){ resEl.innerHTML=''; metaEl.textContent="Type to search every imported item."; detEl.innerHTML='<div class="empty">Type to search.</div>'; return; }
  metaEl.textContent = "Searching…";
  try {
    const data = await (await fetch(ep + "?" + params.toString())).json();
    mode === "sessions" ? renderSessions(data.sessions||[], q) : renderItems(data.results||[], q);
  } catch(e){ metaEl.textContent = "Error: " + e.message; }
}

function renderSessions(rows, q){
  metaEl.textContent = rows.length + (q ? " sessions match “"+q+"”" : " recent sessions");
  if (!rows.length){ resEl.innerHTML = '<div class="empty">No sessions found.</div>'; return; }
  resEl.innerHTML = rows.map((r,i) => `
    <div class="row" data-i="${i}">
      <div class="top">
        <span class="tag src">${esc(r.source_kind)}</span>
        <span class="name">${esc(r.collection_name || r.collection_external_id)}</span>
        <span class="count">${r.item_count} items${r.match_count?(" · "+r.match_count+" matches"):""}</span>
      </div>
      ${r.snippet ? `<div class="snippet">${hl(r.snippet)}</div>` : ""}
      ${r.last_seen ? `<div class="kv" style="color:var(--dim);font-size:12px">last ${esc(r.last_seen)}</div>` : ""}
      ${r.raw_path ? `<div class="path">${esc(r.raw_path)}</div>` : ""}
    </div>`).join("");
  bindRows(rows, "session");
}

function renderItems(rows, q){
  metaEl.textContent = rows.length + " items match “"+q+"”";
  if (!rows.length){ resEl.innerHTML = '<div class="empty">No items found.</div>'; return; }
  resEl.innerHTML = rows.map((r,i) => `
    <div class="row" data-i="${i}">
      <div class="top">
        <span class="tag src">${esc(r.source_kind)}</span>
        <span class="tag">${esc(r.kind)}</span>
        <span class="name">${esc(r.collection_name||"")}</span>
        <span class="count">${esc(r.created_at||"")}</span>
      </div>
      <div class="snippet">${hl(r.snippet)}</div>
    </div>`).join("");
  bindRows(rows, "item");
}

function bindRows(rows, kind){
  resEl.querySelectorAll(".row").forEach(el => {
    el.onclick = () => {
      resEl.querySelectorAll(".row").forEach(r => r.classList.remove("sel"));
      el.classList.add("sel");
      kind === "session" ? showSession(rows[+el.dataset.i]) : showItem(rows[+el.dataset.i].id);
    };
  });
}

function showSession(s){
  const resume = resumeHint(s);
  detEl.innerHTML = `
    <h2>${esc(s.collection_name || s.collection_external_id)}</h2>
    <div class="kv">source: <code>${esc(s.source_kind)}</code></div>
    <div class="kv">collection: <code>${esc(s.collection_external_id)}</code></div>
    <div class="kv">${s.item_count} items${s.match_count?(" · "+s.match_count+" matches"):""}${s.last_seen?(" · last "+esc(s.last_seen)):""}</div>
    ${s.raw_path ? `<div class="kv">raw: <span class="path">${esc(s.raw_path)}</span></div>` : ""}
    ${resume ? `<div class="body"># resume this session\n${esc(resume)}</div>` : ""}
    ${s.snippet ? `<div class="body">${hl(s.snippet)}</div>` : ""}
    <div class="kv" style="margin-top:12px">Open the items inside this session with:</div>
    <div class="body">miseledger search "${esc((qEl.value||"").trim())}" --source ${esc(s.source_kind)} --collection ${esc(s.collection_external_id)}</div>`;
}

// resumeHint maps a session's source to the harness command that reopens it.
function resumeHint(s){
  const id = s.collection_external_id || "";
  const bare = id.includes(":") ? id.split(":").pop() : id;
  switch (s.source_kind) {
    case "codex": return "codex resume " + bare;
    case "claude": return "claude --resume " + bare;
    case "cursor": return "cursor-agent --resume " + bare;
    default: return "";
  }
}

async function showItem(id){
  detEl.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const it = await (await fetch("/items/" + encodeURIComponent(id))).json();
    const col = it.collection||{}, srcK = (it.source||{}).kind||"", act = (it.actor||{}).name||"";
    const path = (it.raw_ref||{}).path||"";
    detEl.innerHTML = `
      <h2>${esc(col.name||it.kind||"item")}</h2>
      <div class="kv">source: <code>${esc(srcK)}</code> · kind: <code>${esc(it.kind||"")}</code></div>
      ${it.created_at?`<div class="kv">${esc(it.created_at)}</div>`:""}
      ${act?`<div class="kv">actor: <code>${esc(act)}</code></div>`:""}
      ${path?`<div class="kv">raw: <span class="path">${esc(path)}</span></div>`:""}
      <div class="body">${esc(it.text||"(no text)")}</div>`;
  } catch(e){ detEl.innerHTML = '<div class="empty">Could not load item.</div>'; }
}

qEl.addEventListener("input", debounce);
srcEl.addEventListener("change", run);
document.querySelectorAll("#mode button").forEach(b => b.onclick = () => setMode(b.dataset.mode));
// "/" focuses search; Ctrl/Cmd+F is hijacked so terminal muscle memory works here.
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== qEl){ e.preventDefault(); qEl.focus(); qEl.select(); }
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="f"){ e.preventDefault(); qEl.focus(); qEl.select(); }
});
loadSources().then(run);
</script>
</body>
</html>
