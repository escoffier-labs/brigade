  <text x="299.5" y="327.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">stable IDs · raw refs</text>
  <rect x="495.0" y="237.0" width="181.5" height="68" rx="12" fill="#0f1318" stroke="#e0a45c"/>
  <text class="workflow-node-label" x="511.0" y="274.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">SQLite ledger</text>
  <text x="511.0" y="293.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">records · relations · FTS5</text>
