  <rect x="706.5" y="155.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="722.5" y="184.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">search + explain</text>
  <text x="722.5" y="204.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">queries with provenance</text>
  <rect x="706.5" y="237.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#e0a45c"/>
