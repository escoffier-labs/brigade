  <text x="722.5" y="286.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">reviewable Markdown</text>
  <rect x="706.5" y="319.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="722.5" y="348.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">HTTP + MCP</text>
  <text x="722.5" y="368.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">local reader surfaces</text>
  <line x1="72" y1="398" x2="888" y2="398" stroke="#1e242c"/>
  <text x="72" y="427" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" font-weight="600" letter-spacing="1.6">EVIDENCE BOUNDARY</text>
  <text x="72" y="455" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="13" font-weight="600">imported text stays data · exports mark untrusted context</text>
  <text x="72" y="478" fill="#7d8590" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">Memory keeps decisions. MiseLedger keeps the proof.</text>
