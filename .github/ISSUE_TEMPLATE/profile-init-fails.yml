name: Init or doctor fails
description: A specific Brigade init, quickstart, or doctor flow fails on a fresh install.
labels: ["bug", "setup"]
body:
  - type: dropdown
    id: profile
    attributes:
      label: Profile
      options:
        - repo
        - workspace
        - openclaw
        - hermes
        - generic
        - publisher
        - quickstart
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact commands you ran
      description: We want to reproduce the failure verbatim.
      render: shell
      placeholder: |
        target="$(mktemp -d)"
        git init -q -b main "$target"
        brigade operator quickstart --target "$target" --harnesses codex
        brigade operator doctor --target "$target" --profile local-operator
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Full output of `init` and `doctor`.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Brigade version
      placeholder: brigade 0.8.1
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything unusual about your target?
      description: Pre-existing files, custom .gitignore, weird filesystem, network sandbox, etc.
    validations:
      required: false
