<svg xmlns="http://www.w3.org/2000/svg" width="725" height="515" viewBox="0 0 725 515" role="img">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="355" y="44" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#1f2937"><tspan x="355" dy="0">The Brigade loop stays local and reviewable</tspan></text>
  <rect x="30" y="130" width="170" height="86" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="115" y="162.5" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#1f2937"><tspan x="115" dy="0">1. Set up</tspan><tspan x="115" dy="21">rules, memory, tools</tspan></text>
  <rect x="270" y="130" width="170" height="86" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="355" y="162.5" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#1f2937"><tspan x="355" dy="0">2. Work</tspan><tspan x="355" dy="21">with your agents</tspan></text>
  <rect x="510" y="130" width="170" height="86" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="595" y="162.5" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#1f2937"><tspan x="595" dy="0">3. Review</tspan><tspan x="595" dy="21">before saving</tspan></text>
  <rect x="270" y="305" width="170" height="86" rx="12" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="355" y="337.5" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#1f2937"><tspan x="355" dy="0">4. Remember</tspan><tspan x="355" dy="21">approved notes only</tspan></text>
  <rect x="510" y="305" width="170" height="86" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="595" y="338" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#1f2937"><tspan x="595" dy="0">Publish?</tspan><tspan x="595" dy="20">Only with your yes</tspan></text>
  <line x1="200" y1="173" x2="270" y2="173" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="173" x2="510" y2="173" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="565" y1="216" x2="440" y2="305" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="502.5" y="250.5" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#475569"><tspan x="502.5" dy="0">handoffs</tspan></text>
  <line x1="270" y1="348" x2="115" y2="218" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="8 7"/>
  <text x="192.5" y="273" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#475569"><tspan x="192.5" dy="0">better next session</tspan></text>
  <line x1="595" y1="216" x2="595" y2="305" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="360" y="465" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#334155"><tspan x="360" dy="0">Everything stays local. The safe notes file themselves.</tspan></text>
</svg>
