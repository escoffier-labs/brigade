<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280" role="img" aria-labelledby="title desc">
  <title id="title">Brigade verify receipt</title>
  <desc id="desc">A verify receipt: pytest -q exited 0, status passed, skill taste scored plus one, filed under .brigade/work/verify-runs/</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f26"/>
      <stop offset="100%" stop-color="#12161c"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d8bfd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3d8bfd" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="744" height="264" rx="14" fill="url(#bg)" stroke="#2a3340" stroke-width="1.5"/>
  <rect x="8" y="8" width="6" height="264" rx="3" fill="url(#edge)"/>

  <!-- header strip -->
  <rect x="8" y="8" width="744" height="56" rx="14" fill="#1e2530"/>
  <rect x="8" y="48" width="744" height="16" fill="#1e2530"/>
  <text x="36" y="42" fill="#8b9bb0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2.2">BRIGADE · VERIFY RECEIPT</text>
  <text x="724" y="42" text-anchor="end" fill="#6b7a8f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">2026-06-30 19:06</text>

  <!-- status pill -->
  <rect x="600" y="78" width="124" height="30" rx="15" fill="#12301f" stroke="#2f8f5b" stroke-width="1"/>
  <circle cx="620" cy="93" r="5" fill="#3ecf8e"/>
  <text x="634" y="98" fill="#7dffb3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">PASSED</text>

  <!-- rows -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
    <text x="36" y="100" fill="#6b7a8f">command</text>
    <text x="160" y="100" fill="#e8eef6">pytest -q</text>

    <text x="36" y="136" fill="#6b7a8f">exit</text>
    <text x="160" y="136" fill="#e8eef6">0</text>
    <text x="220" y="136" fill="#6b7a8f">status</text>
    <text x="300" y="136" fill="#7dffb3">passed</text>

    <text x="36" y="172" fill="#6b7a8f">captured</text>
    <text x="160" y="172" fill="#e8eef6">skill: taste</text>
    <text x="320" y="172" fill="#3d8bfd" font-weight="700">+1</text>

    <text x="36" y="208" fill="#6b7a8f">on file</text>
    <text x="160" y="208" fill="#b7c4d6">.brigade/work/verify-runs/</text>
  </g>

  <!-- footer -->
  <line x1="36" y1="230" x2="724" y2="230" stroke="#2a3340" stroke-width="1"/>
  <text x="36" y="252" fill="#6b7a8f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">Prove: real exit code. Improve: skill ranked +1. Model self-score never used.</text>
</svg>
