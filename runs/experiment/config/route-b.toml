orchestrator = "chef"
codex_transport = "exec"

[agents.chef]
cli = "codex"
model = "gpt-5.6-terra"
reasoning = "low"
role = "Unused orchestrator required by the roster schema."

[agents.sample]
cli = "codex"
model = "gpt-5.6-terra"
reasoning = "low"
role = "Read EVIDENCE.md in the working directory and produce one independent decision from that evidence plus the attached Brigade context only. Do not inspect any other files or run other tools. Return the requested JSON object in under 180 words."

[limits]
max_workers = 1
timeout_seconds = 900
allow_models = ["codex"]
sandbox = "read-only"
